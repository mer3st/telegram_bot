name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        env:
          BOT_TOKEN: dummy
          ADMIN_IDS: "123"
          GOOGLE_SHEET_ID: dummy
          GOOGLE_CREDS_JSON: "{}"
          GEMINI_KEY: dummy
        run: pytest tests/ -v
